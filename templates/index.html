<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Classification System</title>

    <style>
        body {
            font-family: 'Segoe UI';

            /* 🔥 Animated Gradient Background */
            background: linear-gradient(135deg, #667eea, #764ba2, #6b73ff);
            background-size: 300% 300%;
            text-align: center;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-top: 50px;
            font-size: 34px;
        }

        /* 🔥 Upload Box */
        .upload-box {
            margin: 40px auto;
            width: 320px;
            height: 200px;

            border-radius: 20px;
            border: 2px dashed rgba(255,255,255,0.6);

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);

            cursor: pointer;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .upload-box:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.25);
        }

        input {
            display: none;
        }

        #preview {
            max-width: 90%;
            max-height: 140px;
            border-radius: 12px;
            display: none;

            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .text {
            font-size: 15px;
            opacity: 0.9;
        }

        /* 🔥 Attractive Button */
        button {
            margin-top: 25px;
            padding: 12px 35px;

            border: none;
            border-radius: 30px;

            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;

            font-size: 16px;
            cursor: pointer;

            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .loader {
            display: none;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h1>🚗 Vehicle Classification System</h1>

<form action="/predict" method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

    <label class="upload-box">

        <div class="text" id="uploadText">
            📁 Click to Upload Image
        </div>

        <img id="preview">

        <input type="file" name="file" onchange="previewImage(event)" required>
    </label>

    <button type="submit">Predict 🚀</button>

    <div class="loader" id="loader">
        ⏳ Predicting...
    </div>

</form>

<script>
function previewImage(event) {
    const img = document.getElementById('preview');
    const text = document.getElementById('uploadText');

    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = 'block';

    text.style.display = 'none';
}

function showLoader() {
    document.getElementById('loader').style.display = 'block';
}
</script>

</body>
</html>
